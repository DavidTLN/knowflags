<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 z" fill="#16324F"/>
    </marker>
  </defs>

  <rect width="1120" height="720" fill="#FAFAF7"/>

  <!-- ===== Flag ===== -->
  <rect x="120" y="110" width="800" height="480" fill="#DA291C"/>
  <polygon points="120,110 320,110 440,158 320,206 440,254 320,302 440,350 320,398 440,446 320,494 440,542 320,590 120,590" fill="#FFFFFF"/>
  <rect x="120" y="110" width="800" height="480" fill="none" stroke="#0F1923" stroke-width="2"/>

  <!-- centre lines -->
  <line x1="120" y1="350" x2="945" y2="350" stroke="#16324F" stroke-width="1" stroke-dasharray="12 4 2 4" opacity="0.30"/>

  <!-- guide extensions -->
  <g stroke="#16324F" stroke-width="1" stroke-dasharray="3 3" opacity="0.35">
    <line x1="120" y1="110" x2="120" y2="60"/><line x1="320" y1="110" x2="320" y2="60"/>
    <line x1="440" y1="110" x2="440" y2="60"/><line x1="920" y1="110" x2="920" y2="60"/>
    <line x1="920" y1="110" x2="985" y2="110"/><line x1="920" y1="590" x2="985" y2="590"/>
    <line x1="120" y1="110" x2="70" y2="110"/><line x1="120" y1="206" x2="70" y2="206"/>
    <line x1="120" y1="302" x2="70" y2="302"/><line x1="120" y1="398" x2="70" y2="398"/>
    <line x1="120" y1="494" x2="70" y2="494"/><line x1="120" y1="590" x2="70" y2="590"/>
    <line x1="120" y1="620" x2="120" y2="660"/><line x1="920" y1="620" x2="920" y2="660"/>
  </g>

  <!-- ===== Top dimensions: 25 / 15 / 60 ===== -->
  <g stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)">
    <line x1="120" y1="78" x2="320" y2="78"/>
    <line x1="320" y1="78" x2="440" y2="78"/>
    <line x1="440" y1="78" x2="920" y2="78"/>
  </g>
  <g fill="#16324F" font-size="20" font-weight="600" text-anchor="middle">
    <text x="220" y="60">25</text>
    <text x="380" y="60">15</text>
    <text x="680" y="60">60</text>
  </g>

  <!-- ===== Right dimension: 60 ===== -->
  <line x1="985" y1="110" x2="985" y2="590" stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="1008" y="350" fill="#16324F" font-size="20" font-weight="600" text-anchor="middle" transform="rotate(90 1008 350)">60</text>

  <!-- ===== Left dimensions: 12 x5 (the five triangle bands) ===== -->
  <g stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)">
    <line x1="52" y1="110" x2="52" y2="206"/>
    <line x1="52" y1="206" x2="52" y2="302"/>
    <line x1="52" y1="302" x2="52" y2="398"/>
    <line x1="52" y1="398" x2="52" y2="494"/>
    <line x1="52" y1="494" x2="52" y2="590"/>
  </g>
  <g fill="#16324F" font-size="18" font-weight="600" text-anchor="middle">
    <text x="30" y="164" transform="rotate(-90 30 164)">12</text>
    <text x="30" y="260" transform="rotate(-90 30 260)">12</text>
    <text x="30" y="356" transform="rotate(-90 30 356)">12</text>
    <text x="30" y="452" transform="rotate(-90 30 452)">12</text>
    <text x="30" y="548" transform="rotate(-90 30 548)">12</text>
  </g>

  <!-- ===== Tip offset marks: 6 at top & bottom (tips centred on each band) ===== -->
  <g stroke="#16324F" stroke-width="1.1" opacity="0.75" stroke-dasharray="3 3">
    <line x1="440" y1="158" x2="500" y2="158"/><line x1="440" y1="542" x2="500" y2="542"/>
  </g>
  <g stroke="#16324F" stroke-width="1.2" marker-start="url(#ah)" marker-end="url(#ah)">
    <line x1="480" y1="110" x2="480" y2="158"/>
    <line x1="480" y1="542" x2="480" y2="590"/>
  </g>
  <g fill="#16324F" font-size="16" font-weight="600" text-anchor="middle">
    <rect x="470" y="124" width="20" height="20" fill="#FAFAF7"/><text x="480" y="139">6</text>
    <rect x="470" y="556" width="20" height="20" fill="#FAFAF7"/><text x="480" y="571">6</text>
  </g>

  <!-- ===== Bottom dimension: 100 ===== -->
  <line x1="120" y1="642" x2="920" y2="642" stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="520" y="672" fill="#16324F" font-size="20" font-weight="600" text-anchor="middle">100</text>

  <!-- ===== Tags ===== -->
  <text x="40" y="700" fill="#92400E" font-size="16" font-weight="800">[BH]</text>
  <g transform="translate(1010,690)">
    <rect x="-6" y="-16" width="76" height="24" rx="6" fill="#DCFCE7"/>
    <text x="32" y="1" fill="#16A34A" font-size="14" font-weight="800" text-anchor="middle">3 : 5</text>
  </g>

  <!-- title -->
  <text x="120" y="40" fill="#16324F" font-size="15" font-weight="800" letter-spacing="1.5" text-transform="uppercase">BAHRAIN — CONSTRUCTION</text>
</svg>
