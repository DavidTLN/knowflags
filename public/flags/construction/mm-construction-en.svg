<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 724" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 z" fill="#16324F"/>
    </marker>
  </defs>

  <rect width="1120" height="724" fill="#FAFAF7"/>

  <!-- title -->
  <text x="200" y="40" fill="#16324F" font-size="15" font-weight="800" letter-spacing="1.5">MYANMAR — FLAG CONSTRUCTION</text>
  <text x="200" y="62" fill="#6B7280" font-size="13" font-weight="600">Union Flag Law, 2010 · grid 18 × 12</text>

  <!-- ===== Flag ===== -->
  <rect x="200" y="110" width="720" height="160" fill="#FECB00"/>
  <rect x="200" y="270" width="720" height="160" fill="#34B233"/>
  <rect x="200" y="430" width="720" height="160" fill="#EA2839"/>

  <!-- guide circle (circumscribed circle of the star) -->
  <circle cx="560" cy="366.9" r="176.9" fill="none" stroke="#16324F" stroke-width="1" stroke-dasharray="5 5" opacity="0.55"/>

  <!-- centre vertical line -->
  <line x1="560" y1="110" x2="560" y2="590" stroke="#16324F" stroke-width="1" stroke-dasharray="12 4 2 4" opacity="0.30"/>

  <!-- white five-pointed star -->
  <polygon points="560,190 599.7,312.2 728.2,312.2 624.3,387.8 664.0,510 560,434.5 456.0,510 495.7,387.8 391.8,312.2 520.3,312.2"
           fill="#FFFFFF" stroke="#0F1923" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- flag frame -->
  <rect x="200" y="110" width="720" height="480" fill="none" stroke="#0F1923" stroke-width="2"/>

  <!-- guide extensions -->
  <g stroke="#16324F" stroke-width="1" stroke-dasharray="3 3" opacity="0.35">
    <line x1="200" y1="110" x2="200" y2="66"/><line x1="560" y1="110" x2="560" y2="66"/><line x1="920" y1="110" x2="920" y2="66"/>
    <line x1="920" y1="110" x2="990" y2="110"/><line x1="920" y1="590" x2="990" y2="590"/>
    <line x1="200" y1="110" x2="44" y2="110"/><line x1="200" y1="270" x2="44" y2="270"/>
    <line x1="200" y1="430" x2="44" y2="430"/><line x1="200" y1="590" x2="44" y2="590"/>
    <line x1="200" y1="590" x2="200" y2="640"/><line x1="920" y1="590" x2="920" y2="640"/>
  </g>

  <!-- ===== Top dimensions: 9 / 9 ===== -->
  <g stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)">
    <line x1="200" y1="84" x2="560" y2="84"/>
    <line x1="560" y1="84" x2="920" y2="84"/>
  </g>
  <g fill="#16324F" font-size="20" font-weight="600" text-anchor="middle">
    <text x="380" y="66">9</text>
    <text x="740" y="66">9</text>
  </g>

  <!-- ===== Right dimension: 12 ===== -->
  <line x1="985" y1="110" x2="985" y2="590" stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="1008" y="350" fill="#16324F" font-size="20" font-weight="600" text-anchor="middle" transform="rotate(90 1008 350)">12</text>

  <!-- ===== Left dimensions: 4 x3 (the three bands) ===== -->
  <g stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)">
    <line x1="52" y1="110" x2="52" y2="270"/>
    <line x1="52" y1="270" x2="52" y2="430"/>
    <line x1="52" y1="430" x2="52" y2="590"/>
  </g>
  <g fill="#16324F" font-size="18" font-weight="600" text-anchor="middle">
    <text x="30" y="190" transform="rotate(-90 30 190)">4</text>
    <text x="30" y="350" transform="rotate(-90 30 350)">4</text>
    <text x="30" y="510" transform="rotate(-90 30 510)">4</text>
  </g>

  <!-- ===== Star diameter D ===== -->
  <g stroke="#16324F" stroke-width="1" stroke-dasharray="3 3" opacity="0.4">
    <line x1="383.1" y1="366.9" x2="383.1" y2="608"/>
    <line x1="736.9" y1="366.9" x2="736.9" y2="608"/>
  </g>
  <line x1="383.1" y1="608" x2="736.9" y2="608" stroke="#16324F" stroke-width="1.2" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="756" y="613" fill="#16324F" font-size="18" font-weight="700">D</text>

  <!-- ===== Bottom dimension: 18 ===== -->
  <line x1="200" y1="636" x2="920" y2="636" stroke="#16324F" stroke-width="1.3" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="560" y="662" fill="#16324F" font-size="20" font-weight="600" text-anchor="middle">18</text>

  <!-- ===== Captions ===== -->
  <text x="200" y="692" fill="#6B7280" font-size="14" font-weight="600">D = star circumscribed circle = (80 − 16√5) / 5 ≈ 8.84</text>
  <text x="200" y="712" fill="#6B7280" font-size="14" font-weight="500">Ratio 2:3 — three equal bands; white five-pointed star centred, point up.</text>

  <!-- ===== Tags ===== -->
  <text x="40" y="712" fill="#92400E" font-size="16" font-weight="800">[MM]</text>
  <g transform="translate(1010,698)">
    <rect x="-6" y="-16" width="76" height="24" rx="6" fill="#DCFCE7"/>
    <text x="32" y="1" fill="#16A34A" font-size="14" font-weight="800" text-anchor="middle">2 : 3</text>
  </g>
</svg>
